services:
  web:
    build:
      context: .
      dockerfile: docker/build.Dockerfile
    environment:
      - PORT=8000
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "8000:8000"
