<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Template Demo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        #status { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flask Template Demo</h1>
        <p>API Status: <span id="status">Checking...</span></p>
        <h2>Customers</h2>
        <div id="customers">Loading...</div>
    </div>

    <script>
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                document.getElementById('status').innerText = data.status;
            } catch (error) {
                document.getElementById('status').innerText = 'Error';
            }
        }

        async function fetchCustomers() {
            try {
                const response = await fetch('/v1/customer');
                const data = await response.json();
                const container = document.getElementById('customers');
                container.innerHTML = '';
                data.forEach(customer => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<strong>${customer.name}</strong> (${customer.email})`;
                    container.appendChild(div);
                });
            } catch (error) {
                document.getElementById('customers').innerText = 'Error loading customers';
            }
        }

        checkHealth();
        fetchCustomers();
    </script>
</body>
</html>
